experiment:
  name: set_conca_multiconcept
  description: |
    Set-ConCA experiment: group-structured data with shared latent concepts, using filtered subsets from broad LLM benchmarks (toxicity, sentiment, bias, truthfulness, etc). Banned word/question generation via gemma-4-31B-it-uncensored; rewriting via multiple Huihui and Llama models.

  # Candidate pool datasets (filtered for concept-consistent groups)
  datasets:
    - name: jigsaw_toxicity
      dataset_type: jigsaw
      max_samples: 2000
    - name: realtoxicityprompts
      dataset_type: realtoxicityprompts
      max_samples: 2000
    - name: toxigen
      dataset_type: toxigen
      max_samples: 2000
    - name: sst_sentiment
      dataset_type: sst
      max_samples: 2000
    - name: imdb_sentiment
      dataset_type: imdb
      max_samples: 2000
    - name: crows_pairs
      dataset_type: crows_pairs
      max_samples: 2000
    - name: stereoset
      dataset_type: stereoset
      max_samples: 2000
    - name: truthfulqa
      dataset_type: truthfulqa
      max_samples: 2000

  # Banned word/question generator model
  banned_word_model:
    name: gemma-4-31B-it-uncensored
    model_id: TrevorJS/gemma-4-31B-it-uncensored
    batch_size: 4

  # Sentence rewriting models
  rewriting_models:
    - name: Llama-3.2-11B-Vision-Instruct
      model_id: huihui-ai/Llama-3.2-11B-Vision-Instruct-abliterated
      batch_size: 8
    - name: Llama-3.2-3B-Instruct
      model_id: huihui-ai/Llama-3.2-3B-Instruct-abliterated
      batch_size: 8
    - name: Llama-3.2-1B-Instruct
      model_id: huihui-ai/Llama-3.2-1B-Instruct-abliterated
      batch_size: 8
    - name: Huihui-gpt-oss-20b-BF16
      model_id: huihui-ai/Huihui-gpt-oss-20b-BF16-abliterated
      batch_size: 8
    - name: Huihui-gemma-4-E2B-it
      model_id: huihui-ai/Huihui-gemma-4-E2B-it-abliterated
      batch_size: 8
    - name: Huihui-gemma-4-E4B-it
      model_id: huihui-ai/Huihui-gemma-4-E4B-it-abliterated
      batch_size: 8
    - name: Huihui-gemma-4-26B-A4B-it
      model_id: huihui-ai/Huihui-gemma-4-26B-A4B-it-abliterated
      batch_size: 8
    - name: Huihui-gemma-4-31B-it
      model_id: huihui-ai/Huihui-gemma-4-31B-it-abliterated
      batch_size: 8
    - name: Huihui-Qwen3.5-35B-A3B
      model_id: huihui-ai/Huihui-Qwen3.5-35B-A3B-abliterated
      batch_size: 8
    - name: Huihui-Qwen3.5-27B
      model_id: huihui-ai/Huihui-Qwen3.5-27B-abliterated
      batch_size: 8
    - name: Huihui-Qwen3.5-9B
      model_id: huihui-ai/Huihui-Qwen3.5-9B-abliterated
      batch_size: 8
    - name: Huihui-Qwen3.5-4B
      model_id: huihui-ai/Huihui-Qwen3.5-4B-abliterated
      batch_size: 8
    - name: Huihui-Qwen3.5-2B
      model_id: huihui-ai/Huihui-Qwen3.5-2B-abliterated
      batch_size: 8
    - name: Huihui-Qwen3.5-0.8B
      model_id: huihui-ai/Huihui-Qwen3.5-0.8B-abliterated
      batch_size: 8

  extraction:
    method: mean_pooling
    normalize: true

  alignment:
    method: procrustes_svd
    num_anchors: 77
    wasserstein_threshold: 0.5

logging_level: INFO
seed: 42
device: cuda
mixed_precision: true
