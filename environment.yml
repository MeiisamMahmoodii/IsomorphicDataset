name: isomorphic
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  
  # Core PyTorch (Downgraded to CUDA 11.8 to bypass Driver 12020 error)
  - pytorch=2.3.1
  - torchvision=0.18.1
  - torchaudio=2.3.1
  - pytorch-cuda=11.8
  
  - pip:
    # Large Language Model Serving & Quantization
    - transformers>=4.40.0
    - accelerate>=0.29.0
    - bitsandbytes>=0.43.0
    
    # Data Processing & Utilities
    - datasets
    - pandas
    - numpy
    - scipy
    - tqdm
    - pyyaml
    - kaggle
