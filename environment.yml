name: isomorphic
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  
  # Core PyTorch (Downgraded to CUDA 11.8 to bypass Driver 12020 error)
  - pytorch=2.3.1
  - torchvision=0.18.1
  - pytorch-cuda=11.8
  
  - pip:
    # Pin transformers/tokenizers to versions that support Gemma's new ModelWrapper schema
    # while avoiding edge versions that demand PyTorch 2.4+
    - transformers>=4.45.0,<4.48.0
    - tokenizers>=0.20.0
    - accelerate>=0.30.0
    - bitsandbytes>=0.43.0
    
    # Data Processing & Utilities
    - datasets
    - pandas
    - numpy
    - scipy
    - tqdm
    - pyyaml
    - kaggle
